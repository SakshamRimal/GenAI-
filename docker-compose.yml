services:
  task3-postgres:
    image: postgres:16
    container_name: task3-postgres
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
      - task3_pgdata:/var/lib/postgresql/data

  task3-app:
    build: .
    container_name: task3-app
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - .env
    depends_on:
      - task3-postgres

volumes:
  task3_pgdata:
